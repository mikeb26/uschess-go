# yaml-language-server: $schema=https://raw.githubusercontent.com/oapi-codegen/oapi-codegen/v2.7.2/configuration-schema.json
package: uschess
output: client.gen.go
generate:
  models: true
  client: true
output-options:
  prefer-skip-optional-pointer: true
  prefer-skip-optional-pointer-on-container-types: true
  prefer-skip-optional-pointer-with-omitzero: true
  overlay:
    path: oapi-codegen.overlay.yaml
    strict: true
